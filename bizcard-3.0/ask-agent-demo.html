<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ask Agent - BizCard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f1330;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .phone {
            width: 393px;
            height: 852px;
            border-radius: 50px;
            background: #000;
            padding: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .screen {
            width: 100%;
            height: 100%;
            border-radius: 40px;
            overflow: hidden;
            background: linear-gradient(180deg, #f3f7ff 0%, #ffffff 45%);
            position: relative;
            padding: 56px 16px 22px;
            display: flex;
            flex-direction: column;
        }
        .top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .back {
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            background: #fff;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .title {
            font-size: 22px;
            font-weight: 700;
            color: #1d1d1f;
        }
        .chip {
            font-size: 12px;
            color: #0a84ff;
            background: rgba(10, 132, 255, 0.1);
            border: 1px solid rgba(10, 132, 255, 0.18);
            border-radius: 999px;
            padding: 5px 10px;
        }
        .chat {
            flex: 1;
            overflow: auto;
            padding-right: 4px;
        }
        .msg {
            max-width: 84%;
            border-radius: 14px;
            padding: 10px 12px;
            margin-bottom: 10px;
            font-size: 14px;
            line-height: 1.4;
        }
        .msg.agent {
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: #1d1d1f;
        }
        .msg.user {
            margin-left: auto;
            background: #0a84ff;
            color: #fff;
        }
        .composer {
            margin-top: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff;
            border: 1px solid rgba(0, 0, 0, 0.08);
            border-radius: 999px;
            padding: 6px 6px 6px 14px;
        }
        .composer input {
            border: none;
            outline: none;
            flex: 1;
            font-size: 14px;
        }
        .send {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #0a84ff, #7d5fff);
            color: #fff;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <div class="top">
                <button class="back" onclick="goBack()">‹ Back</button>
                <div class="title">Ask Agent</div>
                <div class="chip">AI</div>
            </div>
            <div class="chat">
                <div class="msg agent">Hi, I am BizCard Agent. You can ask me to summarize notes or create reminders.</div>
                <div class="msg user">Summarize this week's meetings.</div>
                <div class="msg agent">Done. I found 5 key points and 3 follow-up reminders. Want me to draft an action list?</div>
            </div>
            <div class="composer">
                <input placeholder="Ask me anything" />
                <button class="send">➤</button>
            </div>
        </div>
    </div>
    <script>
        function goBack() {
            if (document.referrer && document.referrer.includes('home-demo')) {
                history.back();
                return;
            }
            window.location.href = 'home-demo-b.html';
        }
    </script>
</body>
</html>
