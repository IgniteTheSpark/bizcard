<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capture - BizCard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #0f1330;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .phone {
            width: 393px;
            height: 852px;
            border-radius: 50px;
            background: #000;
            padding: 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }
        .screen {
            width: 100%;
            height: 100%;
            border-radius: 40px;
            overflow: hidden;
            background: #fff;
            position: relative;
            padding: 56px 20px 28px;
        }
        .top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }
        .back {
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            background: #fff;
            padding: 8px 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .title {
            font-size: 22px;
            font-weight: 700;
            color: #1d1d1f;
        }
        .lang {
            font-size: 12px;
            color: #8e8e93;
        }
        .slot {
            border: 2px dashed rgba(0, 0, 0, 0.15);
            border-radius: 20px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8e8e93;
            font-weight: 600;
            margin-bottom: 30px;
        }
        .timer {
            text-align: center;
            font-size: 52px;
            line-height: 1;
            font-weight: 700;
            color: #1d1d1f;
            margin-bottom: 8px;
        }
        .state {
            text-align: center;
            color: #8e8e93;
            margin-bottom: 36px;
        }
        .actions {
            display: flex;
            align-items: center;
            justify-content: space-around;
        }
        .action {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            border: none;
            background: rgba(0, 0, 0, 0.06);
            font-size: 26px;
            cursor: pointer;
        }
        .action.stop {
            background: #0a84ff;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="phone">
        <div class="screen">
            <div class="top">
                <button class="back" onclick="goBack()">‹ Back</button>
                <div class="title">Capture</div>
                <div class="lang">English</div>
            </div>
            <div class="slot">Upload Photo</div>
            <div class="timer">00:00</div>
            <div class="state">Recording</div>
            <div class="actions">
                <button class="action">🗑️</button>
                <button class="action">⏸</button>
                <button class="action stop">■</button>
            </div>
        </div>
    </div>
    <script>
        function goBack() {
            if (document.referrer && document.referrer.includes('home-demo')) {
                history.back();
                return;
            }
            window.location.href = 'home-demo-b.html';
        }
    </script>
</body>
</html>
