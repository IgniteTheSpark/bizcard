<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Style B · Paper & Ink</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,400&family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
/* === BASE === */
html, body { height: 100%; margin: 0; overflow: hidden; }
:root {
    --paper: #faf7f2;
    --paper-edge: #efe9de;
    --ink: #191613;
    --ink-soft: #5a544c;
    --crimson: #b31b1b;
    --rule: #1a1a1a;
}
body {
    font-family: 'Source Serif 4', Georgia, serif;
    background: var(--paper);
    color: var(--ink);
    height: 100vh;
    position: relative;
}

/* Subtle paper texture via layered gradients */
body::before {
    content: '';
    position: absolute; inset: 0;
    background:
        radial-gradient(ellipse at 20% 10%, rgba(0,0,0,.03), transparent 60%),
        radial-gradient(ellipse at 80% 90%, rgba(179,27,27,.035), transparent 55%);
    pointer-events: none;
    z-index: 0;
}

/* === SLIDE === */
.slide {
    height: 100vh;
    padding: clamp(1.5rem, 4vh, 3rem) clamp(2rem, 6vw, 5rem);
    display: grid;
    grid-template-rows: auto 1fr auto;
    position: relative;
    z-index: 1;
}

/* === MASTHEAD === */
.masthead {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-bottom: clamp(0.6rem, 1.2vh, 1rem);
    border-bottom: 1px solid var(--rule);
}
.masthead .nameplate {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 700;
    font-style: italic;
    font-size: clamp(1rem, 1.6vw, 1.35rem);
    letter-spacing: 0.02em;
}
.masthead .meta {
    font-size: clamp(0.7rem, 0.9vw, 0.85rem);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
}

/* === HERO === */
.hero {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: clamp(1.2rem, 3vw, 2.5rem);
    align-items: center;
    padding: clamp(1rem, 3vh, 2.5rem) 0;
}
.drop-cap {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(7rem, 18vw, 15rem);
    line-height: 0.85;
    color: var(--crimson);
    letter-spacing: -0.03em;
    opacity: 0;
    animation: bloom 1.2s cubic-bezier(.2,.8,.2,1) 0.1s forwards;
}
.hero-text { overflow: hidden; }
.eyebrow {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(0.9rem, 1.2vw, 1.15rem);
    color: var(--crimson);
    letter-spacing: 0.04em;
    margin: 0 0 clamp(0.3rem, 0.8vh, 0.6rem);
    opacity: 0;
    animation: rise 0.9s cubic-bezier(.2,.8,.2,1) 0.3s forwards;
}
.title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: clamp(2rem, 5.5vw, 4.8rem);
    line-height: 1.02;
    letter-spacing: -0.015em;
    margin: 0;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(.2,.8,.2,1) 0.45s forwards;
}
.title em {
    font-style: italic;
    font-weight: 300;
    color: var(--ink-soft);
}
.deck {
    font-size: clamp(0.95rem, 1.3vw, 1.15rem);
    line-height: 1.55;
    color: var(--ink-soft);
    max-width: 52ch;
    margin: clamp(0.8rem, 2vh, 1.4rem) 0 0;
    opacity: 0;
    animation: rise 0.9s cubic-bezier(.2,.8,.2,1) 0.6s forwards;
}

/* === FOOTER PULL-QUOTE === */
.colophon {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    padding-top: clamp(0.6rem, 1.2vh, 1rem);
    border-top: 1px solid var(--rule);
    font-size: clamp(0.72rem, 0.95vw, 0.88rem);
    color: var(--ink-soft);
    letter-spacing: 0.05em;
}
.colophon strong {
    color: var(--ink);
    font-weight: 600;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.85rem, 1.1vw, 1.05rem);
    font-style: italic;
}
.ornament {
    display: inline-block;
    color: var(--crimson);
    margin: 0 0.5em;
    transform: translateY(-0.08em);
}

/* === ANIMATIONS === */
@keyframes bloom {
    from { opacity: 0; transform: scale(0.88) translateY(0.5rem); filter: blur(3px); }
    to { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
}
@keyframes rise {
    from { opacity: 0; transform: translateY(1.2rem); }
    to { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; }
}
</style>
</head>
<body>
<section class="slide">
    <header class="masthead">
        <div class="nameplate">Eureka · Probation Review</div>
        <div class="meta">Vol. 1 &nbsp;—&nbsp; Apr 2026</div>
    </header>

    <div class="hero">
        <div class="drop-cap">E</div>
        <div class="hero-text">
            <p class="eyebrow">— a product manager's year in brief</p>
            <h1 class="title">从 <em>名片</em> 到<br>效率的 <em>野心</em>。</h1>
            <p class="deck">BizCard 重塑为 EurekaMind，1.0 / 2.0 / 3.0 硬件接力推进，保险客户 10,000 美金首单落地 — 这是一份克制且有态度的试用期答辩。</p>
        </div>
    </div>

    <footer class="colophon">
        <span>Du Yichuang <span class="ornament">✦</span> Product Manager</span>
        <strong>STYLE B / Paper &amp; Ink</strong>
    </footer>
</section>
</body>
</html>
