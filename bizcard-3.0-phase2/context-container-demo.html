<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work Detail Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --line: rgba(17,24,39,.12); --text:#111827; --muted:#6b7280; --bg:#f4f7fc; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; background:radial-gradient(circle at 20% 0%, #23356f 0%, #111b3f 50%, #0a1028 100%); font-family:"Noto Sans SC",sans-serif; }
    .phone { width:430px; max-width:96vw; height:890px; background:#000; border-radius:42px; padding:10px; box-shadow:0 26px 60px rgba(0,0,0,.45); }
    .screen { height:100%; border-radius:33px; overflow:hidden; background:var(--bg); display:flex; flex-direction:column; position:relative; }
    .status { height:32px; display:flex; align-items:center; justify-content:space-between; padding:0 16px; background:#fff; border-bottom:1px solid #e9eef7; color:#374151; font-size:12px; }
    .top { background:#fff; border-bottom:1px solid #dde5f2; padding:10px; }
    .top-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .title { margin:0; color:var(--text); font-size:15px; font-weight:700; font-family:"Sora",sans-serif; }
    .pill { border:1px solid #c7d2fe; background:#eef2ff; color:#3443a3; border-radius:999px; padding:2px 9px; font-size:11px; font-weight:700; }
    .demo-shell { display:flex; flex-direction:column; gap:12px; align-items:center; }
    .entry-switch { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; }
    .section-switch { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; }
    .section-switch::-webkit-scrollbar { display:none; }
    .btn { border:1px solid #dbe3f5; background:#fff; border-radius:999px; padding:6px 12px; font-size:12px; color:#46516a; white-space:nowrap; cursor:pointer; }
    .btn.active { border-color:rgba(47,118,255,.38); background:#edf3ff; color:#1f56b4; font-weight:700; }
    .btn.home-icon { min-width:36px; padding:6px 10px; text-align:center; }
    .content { flex:1; overflow-y:auto; padding:12px 12px 100px; }
    .card { background:#fff; border:1px solid var(--line); border-radius:16px; padding:12px; box-shadow:0 8px 18px rgba(17,24,39,.06); margin-bottom:10px; }
    .sec { margin:0 0 8px; color:#111827; font-size:14px; font-weight:700; }
    .h1 { margin:0 0 8px; color:var(--text); font-family:"Sora",sans-serif; font-size:21px; line-height:1.3; }
    .meta { color:var(--muted); font-size:12px; }
    .row { border:1px solid #e5e7eb; border-radius:12px; padding:10px; margin-top:8px; background:#fff; }
    .t { color:#111827; font-weight:700; font-size:14px; }
    .s { color:#6b7280; font-size:12px; margin-top:4px; }
    .tab-mini { display:flex; gap:8px; overflow-x:auto; scrollbar-width:none; margin-bottom:8px; }
    .tab-mini::-webkit-scrollbar { display:none; }
    .meta-chip { display:inline-flex; align-items:center; gap:6px; border:1px solid #dbe3f5; border-radius:999px; padding:4px 9px; font-size:11px; color:#4b5563; background:#f8faff; margin-top:8px; }
    .source-card { border:1px dashed #bfd3ff; background:#f5f9ff; }
    .source-link { color:#1f56b4; font-weight:700; }
    .list-card { border:1px solid #e5e7eb; border-radius:12px; padding:10px; margin-top:8px; background:#fff; }
    .check-row { display:flex; align-items:flex-start; gap:10px; }
    .check-row input { margin-top:2px; width:16px; height:16px; }
    .contact-row { display:flex; align-items:flex-start; gap:10px; }
    .avatar { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,#2f76ff,#6ba8ff); color:#fff; display:grid; place-items:center; font-size:13px; font-weight:700; flex:0 0 36px; }
    .badge-q { display:inline-block; margin-left:6px; border-radius:999px; border:1px solid #f0b429; color:#b45309; background:#fff7ed; padding:1px 6px; font-size:10px; font-weight:700; }
    .kv { display:flex; gap:8px; align-items:center; margin-top:5px; color:#6b7280; font-size:12px; }
    .type-pill { border:1px solid #dbe3f5; color:#374151; border-radius:999px; padding:1px 8px; font-size:11px; background:#f9fbff; }
    .dock { position:absolute; left:12px; right:12px; bottom:14px; border-radius:16px; background:rgba(17,24,39,.92); border:1px solid rgba(255,255,255,.16); padding:8px; display:flex; gap:8px; }
    .dock button { border:none; border-radius:10px; padding:10px 8px; color:#e5e7eb; background:#303847; font-size:12px; cursor:pointer; flex:1; }
    .dock .record { background:linear-gradient(135deg,#2f76ff,#4da8ff); color:#fff; font-weight:700; }
    .dock .plus { flex:0 0 44px; width:44px; min-width:44px; padding:0; line-height:44px; font-size:24px; background:#3b4252; }
  </style>
</head>

    const sectionTabsEl = document.getElementById("sectionTabs");
    const titleEl = document.getElementById("title");

    function getRenderableSections(view) {
      const mainSection = view.sections.find((s) => s.name === "Main Content");
      const sourceSection = view.sections.find((s) => s.name === "Source");
      const otherSections = view.sections.filter((s) => s.name !== "Main Content" && s.name !== "Source");
      if (!mainSection) return view.sections.filter((s) => s.name !== "Source");
      const mergedMain = sourceSection ? { ...mainSection, html: `${mainSection.html}${sourceSection.html}` } : mainSection;
      return [mergedMain, ...otherSections];
    }

    function renderSwitch() {
      switchEl.innerHTML = order.map((k) => `<button class="btn ${k === currentType ? "active" : ""}" data-k="${k}">${labels[k]}</button>`).join("");
      switchEl.querySelectorAll(".btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          currentType = btn.dataset.k;
          currentSectionIdx = 0;
          currentNoteIdx = 0;
          renderAll();
        });
      });
    }

    function renderSectionTabs() {
      const v = views[currentType];
      const renderableSections = getRenderableSections(v);
      sectionTabsEl.innerHTML = renderableSections.map((s, i) => {
        const isHome = s.name === "Main Content";
        const text = isHome ? "⌂" : s.name;
        const extraClass = isHome ? " home-icon" : "";
        return `<button class="btn${extraClass} ${i === currentSectionIdx ? "active" : ""}" data-i="${i}" title="${s.name}">${text}</button>`;
      }).join("");
      sectionTabsEl.querySelectorAll(".btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          currentSectionIdx = Number(btn.dataset.i);
          renderContent();
          renderSectionTabs();
        });
      });
    }

    function renderNoteTabs() {
      const tabs = document.getElementById("noteTabs");
      const panel = document.getElementById("notePanel");

      const notes = noteSets[currentType] || [];
      if (!notes.length) {
        tabs.innerHTML = "";
        panel.innerHTML = `<div class="s">暂无 Note</div>`;
        return;
      }
      currentNoteIdx = Math.min(currentNoteIdx, notes.length - 1);
      tabs.innerHTML = notes.map((n, i) => `<button class="btn ${i === currentNoteIdx ? "active" : ""}" data-i="${i}">${n.key}</button>`).join("");
      const cur = notes[currentNoteIdx];
      panel.innerHTML = `<div class="t">${cur.title}</div><div class="s">${cur.body}</div>`;
      tabs.querySelectorAll(".btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          currentNoteIdx = Number(btn.dataset.i);
          renderNoteTabs();
        });
      });
    }

      const renderableSections = getRenderableSections(v);
      const section = renderableSections[currentSectionIdx] || renderableSections[0];
      titleEl.textContent = v.title;
      pillEl.textContent = v.pill;
      contentEl.innerHTML = section.html;
      renderNoteTabs();
    }

    function renderAll() {
      renderSwitch();
      renderSectionTabs();
      renderContent();
    }

    renderAll();
  </script>
</body>
</html>
